name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/sdr-studio
            git pull origin main

            # Rebuild and restart containers
            # Pass secrets to docker-compose build args
            export VITE_AUTH0_DOMAIN=${{ secrets.VITE_AUTH0_DOMAIN }}
            export VITE_AUTH0_CLIENT_ID=${{ secrets.VITE_AUTH0_CLIENT_ID }}
            export VITE_AUTH0_AUDIENCE=${{ secrets.VITE_AUTH0_AUDIENCE }}
            export VITE_AUTH0_ORG_ID_CLAIM=${{ secrets.VITE_AUTH0_ORG_ID_CLAIM }}

            docker compose up -d --build
