name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            cd ~/sdr-studio
            git fetch origin main
            git reset --hard origin/main

            # Generate backend/.env from secrets
            echo "AUTH0_DOMAIN=${{ secrets.VITE_AUTH0_DOMAIN }}" > backend/.env
            echo "AUTH0_AUDIENCE=${{ secrets.VITE_AUTH0_AUDIENCE }}" >> backend/.env
            echo "AUTH0_ORG_ID_CLAIM=${{ secrets.VITE_AUTH0_ORG_ID_CLAIM }}" >> backend/.env
            echo "AUTH0_MANAGEMENT_CLIENT_ID=${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}" >> backend/.env
            echo "AUTH0_MANAGEMENT_CLIENT_SECRET=${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}" >> backend/.env
            echo "AUTH0_CLIENT_ID=${{ secrets.VITE_AUTH0_CLIENT_ID }}" >> backend/.env
            echo "APP_SECRET=${{ secrets.APP_SECRET }}" >> backend/.env

            # Rebuild and restart containers
            # Pass secrets to docker-compose build args for frontend
            export VITE_AUTH0_DOMAIN=${{ secrets.VITE_AUTH0_DOMAIN }}
            export VITE_AUTH0_CLIENT_ID=${{ secrets.VITE_AUTH0_CLIENT_ID }}
            export VITE_AUTH0_AUDIENCE=${{ secrets.VITE_AUTH0_AUDIENCE }}
            export VITE_AUTH0_ORG_ID_CLAIM=${{ secrets.VITE_AUTH0_ORG_ID_CLAIM }}
            export VITE_MAPBOX_ACCESS_TOKEN=${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}

            docker compose stop frontend
            docker rmi sdr-studio-frontend || true
            
            docker compose build \
              --build-arg VITE_AUTH0_DOMAIN=${{ secrets.VITE_AUTH0_DOMAIN }} \
              --build-arg VITE_AUTH0_CLIENT_ID=${{ secrets.VITE_AUTH0_CLIENT_ID }} \
              --build-arg VITE_AUTH0_AUDIENCE=${{ secrets.VITE_AUTH0_AUDIENCE }} \
              --build-arg VITE_AUTH0_ORG_ID_CLAIM=${{ secrets.VITE_AUTH0_ORG_ID_CLAIM }} \
              --build-arg VITE_MAPBOX_ACCESS_TOKEN=${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}
            
            docker compose up -d
